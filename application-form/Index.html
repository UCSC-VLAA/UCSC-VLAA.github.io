<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
           color:#333; margin:0; padding:24px; background:#fff; }
    .card { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    p.sub { color:#666; margin: 0 0 24px; }
    label { display:block; font-weight:600; margin: 16px 0 6px; }
    .req:after { content:" *"; color:#c00; }
    input[type=text], input[type=email], select, textarea {
      width:100%; box-sizing:border-box; padding:10px 12px;
      border:1px solid #ccc; border-radius:8px; font-size:15px; font-family:inherit; }
    textarea { min-height: 110px; resize: vertical; }
    input[type=file] { margin-top:6px; }
    .hint { color:#888; font-size:13px; margin-top:4px; }
    .pi-group { margin-top:6px; }
    .pi-group label { display:inline-flex; align-items:center; font-weight:400;
                      margin: 2px 20px 2px 0; }
    .pi-group input { width:auto; margin-right:7px; }
    button { margin-top:24px; background:#1a73e8; color:#fff; border:0;
             padding:12px 22px; border-radius:8px; font-size:16px; cursor:pointer; }
    button:disabled { opacity:.6; cursor:default; }
    #msg { margin-top:18px; padding:14px 16px; border-radius:8px; display:none; }
    #msg.err { background:#fce8e6; color:#c5221f; display:block; }
    .done { text-align:center; padding:48px 0; }
    .done h2 { color:#1e6b34; margin-bottom:8px; }
  </style>
</head>
<body>
  <div class="card">
    <div id="formWrap">
      <h1>Join the VLAA Lab</h1>
      <p class="sub">Tell us about yourself and attach your CV (PDF). We'll be in touch.</p>

      <form id="appForm">
        <label class="req" for="name">Full name</label>
        <input type="text" id="name" name="name" required>

        <label class="req" for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="institution">Current institution</label>
        <input type="text" id="institution" name="institution" placeholder="University / company">

        <label for="position">Position of interest</label>
        <select id="position" name="position">
          <option value="">- Select -</option>
          <option>Ph.D. student</option>
          <option>Postdoc</option>
          <option>Visiting student / scholar</option>
          <option>Intern</option>
          <option>Other</option>
        </select>

        <label>Interested PI <span style="font-weight:400;color:#888">(select one or both)</span></label>
        <div class="pi-group">
          <label><input type="checkbox" class="pi" value="Cihang Xie"> Cihang Xie</label>
          <label><input type="checkbox" class="pi" value="Yuyin Zhou"> Yuyin Zhou</label>
        </div>
        <input type="hidden" name="pi" id="piField">

        <label for="links">Homepage / Google Scholar / GitHub (optional)</label>
        <input type="text" id="links" name="links" placeholder="https://...">

        <label for="message">Message (optional)</label>
        <textarea id="message" name="message" placeholder="Research interests, availability, anything else..."></textarea>

        <label class="req" for="cvFile">CV / resume (PDF)</label>
        <input type="file" id="cvFile" name="cvFile" accept="application/pdf" required>
        <div class="hint">PDF only, up to ~24 MB.</div>

        <div id="msg"></div>
        <button type="submit" id="submitBtn">Submit application</button>
      </form>
    </div>

    <div id="thanks" class="done" style="display:none">
      <h2>Thank you!</h2>
      <p>Your application has been submitted. We've received your CV and will review it soon.</p>
    </div>
  </div>

  <script>
    var form = document.getElementById('appForm');
    var btn  = document.getElementById('submitBtn');
    var msg  = document.getElementById('msg');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      msg.style.display = 'none';

      var file = document.getElementById('cvFile').files[0];
      if (!file) { showErr('Please attach your CV as a PDF.'); return; }
      if (file.type !== 'application/pdf') { showErr('The CV must be a PDF file.'); return; }
      if (file.size > 24 * 1024 * 1024) { showErr('That file is larger than 24 MB. Please upload a smaller PDF.'); return; }

      // Combine the checked PI boxes into the hidden field the server reads.
      var pis = Array.prototype.slice.call(document.querySelectorAll('.pi:checked')).map(function (c) { return c.value; });
      document.getElementById('piField').value = pis.join(', ');

      btn.disabled = true; btn.textContent = 'Submitting...';
      google.script.run
        .withSuccessHandler(onDone)
        .withFailureHandler(onFail)
        .processForm(form);
    });

    function onDone(res) {
      if (res && res.ok) {
        document.getElementById('formWrap').style.display = 'none';
        document.getElementById('thanks').style.display = 'block';
        window.scrollTo(0, 0);
      } else {
        onFail({ message: (res && res.error) || 'Submission failed. Please try again.' });
      }
    }
    function onFail(err) {
      btn.disabled = false; btn.textContent = 'Submit application';
      showErr((err && err.message) ? err.message : 'Submission failed. Please try again.');
    }
    function showErr(t) { msg.textContent = t; msg.className = 'err'; msg.style.display = 'block'; }
  </script>
</body>
</html>
